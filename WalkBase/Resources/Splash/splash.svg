<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Walk Track splash: brick building mark + wordmark (centered on the Color bg from csproj). -->

  <g transform="translate(68,-34) scale(0.7)">
    <!-- Foundation diamond (grass base) -->
    <polygon points="228,283 353,325 228,367 103,325" fill="#4E7D5C" />
    <polygon points="228,367 103,325 103,341 228,383" fill="#33543E" />
    <polygon points="228,367 353,325 353,341 228,383" fill="#2B4836" />

    <!-- Building roof (top face) -->
    <polygon points="228,125 323,173 228,221 133,173" fill="#F0BE6A" />
    <polygon points="228,125 323,173 228,173 133,173" fill="#F7CE85" />

    <!-- Walls -->
    <polygon points="133,173 228,221 228,331 133,283" fill="#C9603B" />
    <polygon points="323,173 228,221 228,331 323,283" fill="#A84B2E" />

    <!-- Brick courses -->
    <g stroke="#9B4A2C" stroke-width="3" opacity="0.55">
      <line x1="133" y1="210" x2="228" y2="258" />
      <line x1="133" y1="247" x2="228" y2="295" />
    </g>
    <g stroke="#823A22" stroke-width="3" opacity="0.55">
      <line x1="323" y1="210" x2="228" y2="258" />
      <line x1="323" y1="247" x2="228" y2="295" />
    </g>
    <line x1="180" y1="197" x2="180" y2="307" stroke="#9B4A2C" stroke-width="3" opacity="0.4" />
    <line x1="276" y1="197" x2="276" y2="307" stroke="#823A22" stroke-width="3" opacity="0.4" />

    <!-- Door -->
    <polygon points="210,289 228,298 228,331 210,322" fill="#5B2C1A" />
  </g>

  <!-- Wordmark: two single-run texts anchored about the centre (228). Using a single
       text-anchor="middle" with two coloured tspans mis-centres in the SVG rasteriser,
       which only anchors the first tspan and appends the rest — shifting the mark right.
       Anchoring "Walk" (end) and "Track" (start) on either side keeps it centred. -->
  <text x="212" y="318" font-family="Verdana, Arial, sans-serif" font-size="46" font-weight="bold" text-anchor="end" fill="#EAF0F7">Walk</text>
  <text x="230" y="318" font-family="Verdana, Arial, sans-serif" font-size="46" font-weight="bold" text-anchor="start" fill="#F2C84B">Track</text>
  <!-- Tagline -->
  <text x="228" y="352" font-family="Verdana, Arial, sans-serif" font-size="18" fill="#90A1B7" text-anchor="middle" letter-spacing="2">STEPS INTO BRICKS</text>
</svg>
